<body class="bg-surface text-on-surface font-body min-h-screen antialiased flex flex-col md:flex-row">
<!-- SideNavBar (Suppressed due to end of journey logic, but keeping structure for reference if needed, hidden here) -->
<nav aria-label="Sidebar Navigation" class="hidden"></nav>
<!-- Main Canvas -->
<main class="flex-grow flex flex-col items-center justify-center min-h-screen relative p-6 md:p-12 w-full max-w-5xl mx-auto">
<!-- Top Actions -->
<div class="absolute top-8 right-8 flex gap-6">
<button class="text-secondary hover:text-on-surface transition-colors duration-300 font-label tracking-widest uppercase text-xs border-b border-outline-variant/30 hover:border-outline-variant pb-1 flex items-center gap-2">
<span class="material-symbols-outlined" style="font-size: 16px;">download</span>
                Exporter en Markdown
            </button>
<button class="text-secondary/50 cursor-not-allowed font-label tracking-widest uppercase text-xs pb-1 flex items-center gap-2" disabled="" title="Bientôt disponible">
<span class="material-symbols-outlined" style="font-size: 16px;">picture_as_pdf</span>
                Exporter en PDF (Bientôt)
            </button>
</div>
<article class="w-full max-w-2xl flex flex-col items-center text-center space-y-16 mt-16 md:mt-0">
<!-- Solemn Announcement -->
<header class="space-y-4">
<h1 class="font-headline text-5xl md:text-6xl text-on-surface tracking-tight" style="font-weight: 300;">L'histoire touche à sa fin.</h1>
</header>
<!-- Ace of Spades Art -->
<div class="relative w-48 h-72 flex items-center justify-center">
<!-- Hand-drawn style SVG representation of an Ace of Spades -->
<svg class="text-on-surface" height="100%" viewbox="0 0 200 300" width="100%" xmlns="http://www.w3.org/2000/svg">
<rect class="hand-drawn-border opacity-30" fill="none" height="290" stroke="currentColor" stroke-width="2" width="190" x="5" y="5"></rect>
<text fill="currentColor" font-family="Newsreader" font-size="24" x="20" y="40">A</text>
<path d="M 25 45 C 30 40, 35 45, 30 55 C 25 60, 20 55, 25 45 Z" fill="currentColor" opacity="0.8"></path>
<text fill="currentColor" font-family="Newsreader" font-size="24" transform="rotate(180 180 260)" x="180" y="260">A</text>
<g transform="translate(100, 150) scale(2)">
<path d="M 0 -30 C 20 -10, 30 10, 0 30 C -30 10, -20 -10, 0 -30 Z" fill="currentColor" opacity="0.9"></path>
<path d="M -5 30 L 5 30 L 2 45 L -2 45 Z" fill="currentColor" opacity="0.9"></path>
<path d="M 0 -30 C 5 -15, 10 -5, 0 5 C -10 -5, -5 -15, 0 -30 Z" fill="#fef9ef" opacity="0.5"></path>
</g>
</svg>
</div>
<!-- Epilogue Prompt & Input -->
<div class="w-full space-y-8 bg-surface-container-low p-8 md:p-12 ambient-shadow">
<label class="block font-headline text-2xl text-on-surface italic text-left" for="final-entry">
                    Décrivez vos derniers instants avant que le silence ne devienne définitif.
                </label>
<textarea class="w-full journal-input font-journal text-2xl text-on-surface leading-relaxed resize-none p-2 placeholder-on-surface-variant/30" id="final-entry" placeholder="L'encre sèche sur la page..." rows="8"></textarea>
</div>
<!-- Final Action -->
<div class="pt-12 pb-24">
<button class="gradient-bg-primary text-on-primary font-headline text-xl px-12 py-4 tracking-wide hover:bg-primary-container transition-colors duration-300 flex items-center gap-3">
                    Refermer le journal

</button>
</div>
