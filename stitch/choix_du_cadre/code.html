<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Choix du cadre - The Relic Ledger</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#ddc0be",
                        "tertiary-fixed": "#aaf0e6",
                        "surface-container-lowest": "#ffffff",
                        "background": "#fef9ef",
                        "primary-fixed-dim": "#ffb3af",
                        "secondary-container": "#eaddd2",
                        "on-error": "#ffffff",
                        "primary": "#6c1518",
                        "on-primary": "#ffffff",
                        "tertiary": "#003e39",
                        "on-tertiary-container": "#86cbc1",
                        "tertiary-fixed-dim": "#8ed3ca",
                        "surface-container": "#f2ede3",
                        "secondary-fixed-dim": "#d1c4b9",
                        "inverse-on-surface": "#f5f0e6",
                        "surface-container-high": "#ede8de",
                        "on-primary-container": "#ffa8a3",
                        "surface-tint": "#a23d3b",
                        "on-primary-fixed-variant": "#822526",
                        "surface-container-low": "#f8f3e9",
                        "inverse-surface": "#32302a",
                        "on-secondary-fixed-variant": "#4d453d",
                        "primary-container": "#8b2c2c",
                        "tertiary-container": "#005750",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#6a6158",
                        "on-primary-fixed": "#410005",
                        "surface-bright": "#fef9ef",
                        "surface-variant": "#e7e2d8",
                        "surface-container-highest": "#e7e2d8",
                        "on-secondary-fixed": "#211b14",
                        "on-surface": "#1d1c16",
                        "on-tertiary-fixed-variant": "#00504a",
                        "on-secondary": "#ffffff",
                        "outline": "#897170",
                        "inverse-primary": "#ffb3af",
                        "secondary-fixed": "#ede0d5",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#00201d",
                        "surface-dim": "#dedad0",
                        "surface": "#fef9ef",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#ffdad7",
                        "on-surface-variant": "#564240",
                        "on-background": "#1d1c16",
                        "secondary": "#665d54",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "0px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Newsreader", "serif"],
                        "body": ["Newsreader", "serif"],
                        "label": ["Newsreader", "serif"],
                        "journal": ["Caveat", "cursive"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: theme('colors.surface');
            color: theme('colors.on-surface');
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.05"/%3E%3C/svg%3E');
            z-index: 50;
        }
        .analog-shadow {
            box-shadow: 0 20px 40px rgba(29, 28, 22, 0.06);
        }
    </style>
</head>
<body class="font-body min-h-screen flex flex-col md:flex-row antialiased overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Side Navigation (Suppressed - Task-Focused Intent) -->
<!-- The user is in a focused flow (Choix du cadre) that leads to creating a new entry. -->
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col min-h-screen relative w-full items-center justify-center p-6 md:p-16 lg:p-24 bg-surface">
<!-- Header -->
<header class="w-full max-w-5xl flex justify-between items-start mb-24 md:mb-32">
<button class="flex items-center gap-2 text-secondary hover:text-on-surface transition-colors duration-300">
<span class="material-symbols-outlined text-[1.25rem]">arrow_back</span>
<span class="font-headline tracking-[0.05rem] text-[0.6875rem] uppercase">Retour</span>
</button>
<div class="text-right">
<p class="font-headline tracking-[0.05rem] text-[0.6875rem] uppercase text-secondary mb-2">Étape 2</p>
<h1 class="font-headline text-3xl md:text-5xl lg:text-6xl text-on-surface tracking-tight leading-none">Sélectionner un Cadre</h1>
</div>
</header>
<!-- Cards Container (Asymmetric Layout) -->
<div class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-3 gap-12 md:gap-8 lg:gap-16 items-center relative z-10">
<!-- Card 1: Random (Face down concept) -->
<button class="group flex flex-col items-center text-left md:mt-16 w-full max-w-sm mx-auto transition-transform duration-300 hover:-translate-y-2">
<div class="w-full aspect-[2/3] bg-surface-container-high analog-shadow mb-8 relative overflow-hidden border border-outline-variant/15 flex items-center justify-center p-8">
<!-- Ornate back pattern concept using CSS gradients and shapes -->
<div class="absolute inset-4 border border-outline-variant/30 opacity-50"></div>
<div class="absolute inset-6 border border-outline-variant/20 opacity-30"></div>
<span class="material-symbols-outlined text-4xl text-secondary group-hover:text-primary transition-colors duration-500">casino</span>
</div>
<div class="w-full pl-4 border-l border-outline-variant/30 group-hover:border-primary/50 transition-colors duration-300">
<h2 class="font-headline text-2xl md:text-3xl mb-2 text-on-surface">Cadre au hasard</h2>
<p class="font-body text-secondary text-sm md:text-base leading-relaxed">Laissez le destin choisir le théâtre de votre prochain récit.</p>
</div>
</button>
<!-- Card 2: Browse (Center focal point) -->
<button class="group flex flex-col items-center text-left md:-mt-8 w-full max-w-sm mx-auto transition-transform duration-300 hover:-translate-y-2">
<div class="w-full aspect-[2/3] bg-surface-container-lowest analog-shadow mb-8 relative overflow-hidden border border-outline-variant/15 flex items-center justify-center p-8 group-hover:bg-surface-container transition-colors duration-500">
<div class="absolute inset-0 bg-gradient-to-b from-transparent to-surface-container-low/50"></div>
<span class="material-symbols-outlined text-4xl text-secondary group-hover:text-primary transition-colors duration-500 z-10">auto_stories</span>
</div>
<div class="w-full pl-4 border-l border-outline-variant/30 group-hover:border-primary/50 transition-colors duration-300">
<h2 class="font-headline text-2xl md:text-3xl mb-2 text-on-surface">Parcourir les cadres</h2>
<p class="font-body text-secondary text-sm md:text-base leading-relaxed">Consultez les archives pour sélectionner un lieu spécifique.</p>
</div>
</button>
<!-- Card 3: Personal (Offset right) -->
<button class="group flex flex-col items-center text-left md:mt-24 w-full max-w-sm mx-auto transition-transform duration-300 hover:-translate-y-2">
<div class="w-full aspect-[2/3] bg-surface-container-low analog-shadow mb-8 relative overflow-hidden border border-outline-variant/15 flex items-center justify-center p-8">
<!-- Blank page concept -->
<div class="w-3/4 h-px bg-outline-variant/30 absolute top-1/3 left-1/2 -translate-x-1/2"></div>
<div class="w-3/4 h-px bg-outline-variant/30 absolute top-1/2 left-1/2 -translate-x-1/2"></div>
<div class="w-1/2 h-px bg-outline-variant/30 absolute top-2/3 left-1/2 -translate-x-1/2"></div>
<span class="material-symbols-outlined text-4xl text-secondary group-hover:text-primary transition-colors duration-500 z-10">edit</span>
</div>
<div class="w-full pl-4 border-l border-outline-variant/30 group-hover:border-primary/50 transition-colors duration-300">
<h2 class="font-headline text-2xl md:text-3xl mb-2 text-on-surface">Cadre personnel</h2>
<p class="font-body text-secondary text-sm md:text-base leading-relaxed">Décrivez un lieu inédit, forgé par votre propre mémoire.</p>
</div>
</button>
</div>
<!-- Bottom atmospheric element -->
<div class="absolute bottom-12 right-12 w-32 h-32 border-r border-b border-outline-variant/20 opacity-50 pointer-events-none"></div>
</main>
</body></html>
