<!DOCTYPE html>

<html class="light" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Relic Ledger - Écriture</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&amp;family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#ffffff",
                        "surface-container-high": "#ede8de",
                        "error": "#ba1a1a",
                        "surface": "#fef9ef",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#8b2c2c",
                        "primary": "#6c1518",
                        "error-container": "#ffdad6",
                        "surface-bright": "#fef9ef",
                        "on-primary-fixed-variant": "#822526",
                        "on-secondary-fixed-variant": "#4d453d",
                        "on-primary-fixed": "#410005",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#e7e2d8",
                        "on-surface": "#1d1c16",
                        "on-background": "#1d1c16",
                        "tertiary-fixed": "#aaf0e6",
                        "outline-variant": "#ddc0be",
                        "surface-variant": "#e7e2d8",
                        "surface-dim": "#dedad0",
                        "on-secondary-fixed": "#211b14",
                        "on-surface-variant": "#564240",
                        "on-primary-container": "#ffa8a3",
                        "surface-tint": "#a23d3b",
                        "outline": "#897170",
                        "on-secondary-container": "#6a6158",
                        "tertiary": "#003e39",
                        "on-error-container": "#93000a",
                        "background": "#fef9ef",
                        "on-tertiary-container": "#86cbc1",
                        "on-tertiary-fixed": "#00201d",
                        "inverse-surface": "#32302a",
                        "secondary": "#665d54",
                        "tertiary-container": "#005750",
                        "secondary-container": "#eaddd2",
                        "secondary-fixed-dim": "#d1c4b9",
                        "secondary-fixed": "#ede0d5",
                        "surface-container": "#f2ede3",
                        "on-tertiary-fixed-variant": "#00504a",
                        "on-secondary": "#ffffff",
                        "primary-fixed-dim": "#ffb3af",
                        "inverse-on-surface": "#f5f0e6",
                        "primary-fixed": "#ffdad7",
                        "on-tertiary": "#ffffff",
                        "inverse-primary": "#ffb3af",
                        "tertiary-fixed-dim": "#8ed3ca",
                        "surface-container-low": "#f8f3e9"
                    },
                    "borderRadius": {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "0px"
                    },
                    "fontFamily": {
                        "headline": ["Newsreader", "serif"],
                        "body": ["Newsreader", "serif"],
                        "label": ["Newsreader", "serif"],
                        "journal": ["Caveat", "cursive"]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: theme('colors.surface');
            color: theme('colors.on-surface');
            /* Paper grain texture */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
        }
        
        /* Minimalist writing area styles */
        .journal-textarea {
            resize: none;
            background: transparent;
            /* Lined paper effect */
            background-image: linear-gradient(transparent, transparent calc(100% - 1px), theme('colors.outline-variant') 1px);
            background-size: 100% 2.5rem;
            line-height: 2.5rem;
            padding-top: 0.5rem;
        }
        
        .journal-textarea:focus {
            outline: none;
            /* Focus state: subtle wash and stronger line */
            background-color: theme('colors.surface-container-low');
            background-image: linear-gradient(transparent, transparent calc(100% - 1px), theme('colors.primary') 1px);
        }

        /* Gradient for primary buttons */
        .btn-primary {
            background: linear-gradient(to right, theme('colors.primary'), theme('colors.primary-container'));
        }
        
        .btn-primary:hover {
            background: theme('colors.primary-container');
        }

        /* Tonal layering for header/footer */
        .tonal-header {
            background-color: theme('colors.surface-container-low');
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex flex-col font-body selection:bg-primary-container selection:text-on-primary">
<!-- Top Header (Fixed) -->
<header class="tonal-header shrink-0 pt-12 pb-8 px-6 md:px-12 flex flex-col items-center justify-center relative z-10">
<!-- Back Button (Subtle) -->
<button class="absolute top-8 left-6 md:left-12 text-secondary hover:text-on-surface transition-colors duration-300 flex items-center gap-2 font-label text-[0.6875rem] uppercase tracking-[0.05rem]">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
            Retour
        </button>
<div class="flex items-center gap-4 max-w-2xl mx-auto text-center mt-6">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 0;">playing_cards</span>
<h1 class="font-headline text-lg md:text-xl italic font-light text-on-surface">Un souvenir de chaleur...</h1>
<span class="text-secondary font-label text-[0.6875rem] tracking-[0.05rem] ml-2">7 of Hearts</span>
</div>
</header>
<!-- Main Writing Canvas -->
<main class="flex-grow relative z-0 flex flex-col items-center justify-start w-full max-w-4xl mx-auto px-6 md:px-12 pt-12 pb-4">
<label class="sr-only" for="journal-entry">Écrivez votre souvenir</label>
<textarea autofocus="" class="journal-textarea w-full h-full font-journal text-2xl md:text-3xl text-on-surface border-none p-0 bg-transparent placeholder:text-secondary/50 placeholder:font-journal" id="journal-entry" placeholder="La chaleur du soleil sur le bois ancien..."></textarea>
</main>
<!-- Bottom Footer -->
<footer class="shrink-0 pt-6 pb-12 px-6 md:px-12 flex justify-between items-end max-w-4xl mx-auto w-full relative z-10">
<!-- Word Counter -->
<div class="text-secondary font-label text-[0.6875rem] tracking-[0.05rem] uppercase">
<span id="word-count">0</span> Mots
        </div>
<!-- Terminer Button -->
<button class="btn-primary text-on-primary font-label text-[0.6875rem] uppercase tracking-[0.05rem] px-8 py-4 transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface">
            Terminer l'entrée
        </button>
</footer>
</body></html>
