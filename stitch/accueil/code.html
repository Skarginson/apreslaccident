<style>
        body {
            font-family: 'Newsreader', serif;
            background-color: theme('colors.surface');
            color: theme('colors.on-surface');
            position: relative;
        }
        
        /* Subtle paper grain texture via pseudo-element */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .btn-primary {
            background-color: theme('colors.primary');
            color: theme('colors.on-primary');
            border-radius: 0;
            transition: background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background-image: linear-gradient(to bottom right, theme('colors.primary'), theme('colors.primary-container'));
        }
        
        .btn-primary:hover {
            background-color: theme('colors.primary-container');
            background-image: none;
        }

        .btn-secondary {
            color: theme('colors.on-surface');
            border-bottom: 1px solid rgba(137, 113, 112, 0.3); /* outline-variant at 30% */
            transition: border-color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-secondary:hover {
            border-color: theme('colors.outline');
        }
    </style>
